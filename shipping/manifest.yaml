apiVersion: v1 
kind: ConfigMap 
metadata:
  name: shipping 
  namespace: roboshop
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---
apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: shipping 
  namespace: roboshop 
  # labels related to deployemrn resource
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  replicas: 1
  selector:
    matchLabels: 
      project: roboshop
      tier: backend
      component: shipping
  # Pod 
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping
    spec:
      containers:
      - name: shipping 
        image: chandu2828/shipping:v1 
        ports:
        - name: liveness-port
          containerPort: 8080 
        startupProbe: 
          httpGet:
            path: /health 
            port: liveness-port 
            # we are giving 2 minutes to start the application 
          failureThreshold: 12 # Try 12 times before giving up 
          periodSeconds: 10 # wait 10 seconds between attempts
          # Total allowed boot time: 12 * 10 = 120 seconds (2 minutes)
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port 
          periodSeconds: 10 
        livenessProbe:
          httpGet: 
            path: /health 
            port: liveness-port 
          periodSeconds: 10 
        envFrom:
        - configMapRef:
            name: shipping 
---
apiVersion: v1 
kind: Service 
metadata:
  name: shipping 
  namespace: roboshop 
  labels:
    project: roboshop 
    tier: backend 
    component: shipping 
spec:
  selector:
    project: roboshop 
    tier: backend 
    component: shipping 
  ports:
  - protocol: TCP 
    port: 8080 
    targetPort: 8080 
